<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #300a24;
            --color-text: #ffffff;
            --color-prompt-user: #8ae234;
            --color-prompt-path: #729fcf;
            --color-error: #ff5555;
        }
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Ubuntu Mono', monospace;
            font-size: 16px;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #terminal {
            width: 100vw;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: scroll;
            scrollbar-width: auto;
        }
        #terminal::-webkit-scrollbar {
            width: 12px;
        }
        #terminal::-webkit-scrollbar-track {
            background: #230619;
        }
        #terminal::-webkit-scrollbar-thumb {
            background: #50113c;
            border-radius: 6px;
        }

        #output {
            white-space: pre-wrap;
            padding-bottom: 5px;
        }
        #input-container {
            display: flex;
            align-items: center;
        }
        #prompt-display {
            margin-right: 5px;
            white-space: pre;
        }
        .prompt-user {
            color: var(--color-prompt-user);
            font-weight: bold;
        }
        .prompt-path {
            color: var(--color-prompt-path);
            font-weight: bold;
        }
        #command-input {
            background-color: transparent;
            color: inherit;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: inherit;
            flex-grow: 1;
            caret-color: var(--color-text);
            padding: 0;
            margin: 0;
        }
        .ls-file {
            color: #ffffff;
        }
        .ls-dir {
            color: var(--color-prompt-path);
            font-weight: bold;
        }
        .error-message {
            color: var(--color-error);
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-container">
            <span id="prompt-display"></span>
            <input type="text" id="command-input" autofocus autocomplete="off">
        </div>
    </div>

    <script src="terminal.js"></script>
</body>
</html>
